name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  # Allow a manual run from the Actions tab at any time
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run tests
        run: python -m unittest discover -s tests -v
